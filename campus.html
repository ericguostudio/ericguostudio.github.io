<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Campus 3D · Ulink IB</title>
  <link rel="icon" href="./logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --blue:#17446a; --blue-mid:#4b708c; --blue-deep:#102f47; --coral:#d83a34;
      --paper:#f8faf8; --vellum:rgba(248,250,248,.9); --text:#1c2b33; --sub:#68767c;
      --line:rgba(23,68,106,.14); --shadow:rgba(16,47,71,.17); --green:#5c7864;
    }
    *,*::before,*::after{ margin:0; padding:0; box-sizing:border-box; }
    html,body{ width:100%; height:100%; overflow:hidden;
      font-family:'Manrope',sans-serif; color:var(--text); background:#dbe4e1; }
    #app{ position:fixed; inset:0; touch-action:none; }
    #app canvas{ display:block; touch-action:none; }

    .labels{ position:absolute; inset:0; pointer-events:none; }
    .pin{
      width:28px; height:28px; border-radius:50%;
      background:var(--paper); color:var(--blue-deep);
      border:2px solid var(--blue);
      font:800 11.5px/24px 'Manrope'; text-align:center;
      box-shadow:0 6px 16px rgba(16,47,71,.2), 0 0 0 3px rgba(248,250,248,.82);
      pointer-events:auto; cursor:pointer;
      transform:translateY(0); transition:transform .25s cubic-bezier(.34,1.56,.64,1), background .25s, box-shadow .25s;
      will-change:transform;
    }
    .pin.flat{ width:24px; height:24px; line-height:20px; font-size:10px; background:#eef3ef; border-color:var(--green); }
    .pin:hover,.pin.hover{ transform:scale(1.18) translateY(-2px); }
    .pin.active{ background:var(--coral); color:#fff; transform:scale(1.34) translateY(-4px);
      border-color:var(--coral); box-shadow:0 10px 24px rgba(176,43,38,.35), 0 0 0 4px rgba(248,250,248,.94); }
    /* room labels for the floor-1 plans */
    .room-lbl{ display:flex; flex-direction:column; align-items:center; line-height:1.05; padding:.28rem .5rem; border-radius:5px;
      background:rgba(248,250,248,.88); backdrop-filter:blur(4px); border:1px solid var(--line);
      box-shadow:0 3px 9px rgba(16,47,71,.11); color:var(--blue-deep);
      font:700 .62rem 'Manrope'; letter-spacing:0; white-space:nowrap; pointer-events:none; }
    .room-lbl small{ font-weight:500; font-size:.5rem; color:var(--sub); margin-top:1px; }
    .room-lbl.room-exitlbl{ background:rgba(23,68,106,.92); color:#fff; border-color:rgba(255,255,255,.55); }
    .floor-title{ font-family:'Noto Serif SC',serif; font-weight:700; font-size:1.05rem; color:var(--blue-deep);
      background:rgba(248,250,248,.92); backdrop-filter:blur(6px);
      border:1px solid var(--line); box-shadow:0 7px 20px rgba(16,47,71,.13);
      padding:.4rem .9rem; border-radius:5px; white-space:nowrap; pointer-events:none; }

    .topbar{ position:fixed; top:0; left:0; right:0; z-index:20;
      display:flex; align-items:flex-start; justify-content:space-between; padding:1.15rem 1.45rem;
      background:linear-gradient(180deg, rgba(226,235,232,.92) 0%, rgba(226,235,232,0) 100%);
      pointer-events:none; }
    .brand{ display:flex; align-items:center; gap:.65rem; pointer-events:auto; }
    .brand-mark{ width:32px; height:32px; object-fit:contain; filter:drop-shadow(0 3px 7px rgba(16,47,71,.12)); }
    .brand-copy{ display:flex; flex-direction:column; gap:3px; }
    .brand .u{ font-weight:800; font-size:1rem; letter-spacing:.22em; color:var(--blue-deep); line-height:1; }
    .brand .cn{ font-size:.55rem; font-weight:600; letter-spacing:.1em; color:var(--blue); opacity:.72; }
    .toptag{ margin-top:.2rem; font-size:.58rem; letter-spacing:.16em; text-transform:uppercase; color:var(--blue); opacity:.7; font-weight:700; pointer-events:auto; }

    /* ── Top slide-bar (mode switch) ── */
    .modebar{ position:fixed; top:1.05rem; left:50%; transform:translateX(-50%); z-index:21;
      display:flex; gap:2px; padding:4px; border-radius:7px; isolation:isolate;
      background:rgba(248,250,248,.9);
      backdrop-filter:blur(14px) saturate(110%); -webkit-backdrop-filter:blur(14px) saturate(110%);
      border:1px solid var(--line);
      box-shadow:0 12px 32px var(--shadow), inset 0 1px 0 rgba(255,255,255,.75);
      opacity:0; animation:slideDown .8s cubic-bezier(.16,1,.3,1) .2s forwards; }
    .modebar .mode{ position:relative; z-index:1; border:none; background:transparent; cursor:pointer;
      padding:.56rem 1.1rem; border-radius:4px; font:700 .7rem 'Manrope'; letter-spacing:0;
      color:var(--blue-deep); white-space:nowrap; transition:color .3s; }
    .modebar .mode.active{ color:#fff; }
    .mode-ind{ position:absolute; top:4px; bottom:4px; left:4px; width:80px; z-index:0; border-radius:4px;
      background:var(--coral);
      box-shadow:0 5px 15px rgba(176,43,38,.25), inset 0 1px 0 rgba(255,255,255,.2);
      transition:left .45s cubic-bezier(.34,1.4,.5,1), width .45s cubic-bezier(.34,1.4,.5,1); }
    @keyframes slideDown{ from{opacity:0; transform:translateX(-50%) translateY(-14px);} to{opacity:1; transform:translateX(-50%) translateY(0);} }

    /* ── Map index sidebar ── */
    .glass-defs{ position:absolute; width:0; height:0; pointer-events:none; }
    .guide{ position:fixed; top:50%; left:1.25rem; transform:translateY(-50%); z-index:18; width:260px; max-height:79vh;
      border-radius:6px; isolation:isolate;
      background:var(--vellum);
      backdrop-filter:blur(16px) saturate(108%);
      -webkit-backdrop-filter:blur(16px) saturate(108%);
      border:1px solid var(--line);
      box-shadow:0 20px 50px rgba(16,47,71,.17), 0 1px 0 rgba(255,255,255,.75) inset;
      display:flex; flex-direction:column; overflow:hidden;
      opacity:0; animation:slideL .8s cubic-bezier(.16,1,.3,1) .3s forwards; }
    .guide::before{ content:''; position:absolute; top:0; left:0; right:0; height:3px; z-index:2; pointer-events:none;
      background:linear-gradient(90deg,var(--coral) 0 28%,var(--blue) 28% 100%); }
    .guide::after{ content:''; position:absolute; inset:0; z-index:0; pointer-events:none; border-radius:inherit;
      background:linear-gradient(145deg, rgba(255,255,255,.38), transparent 38%); }
    .guide-h, .guide-list{ position:relative; z-index:1; }
    .guide-h{ padding:1.25rem 1.2rem .9rem; border-bottom:1px solid var(--line); box-shadow:none; }
    .guide-h .t{ font-family:'Noto Serif SC',serif; font-weight:700; font-size:1.25rem; color:var(--blue-deep); line-height:1.1; }
    .guide-h .s{ font-size:.57rem; letter-spacing:.09em; color:var(--sub); margin-top:5px; text-transform:uppercase; }
    .guide-list{ overflow-y:auto; padding:.55rem; scrollbar-width:thin; scrollbar-color:rgba(23,68,106,.24) transparent; }
    .guide-list::-webkit-scrollbar{ width:6px; }
    .guide-list::-webkit-scrollbar-thumb{ background:rgba(23,68,106,.22); border-radius:3px; }
    .guide-section{ padding:.15rem 0 .35rem; }
    .guide-section + .guide-section{ border-top:1px solid var(--line); margin-top:.35rem; padding-top:.7rem; }
    .guide-section-title{ padding:.35rem .65rem .5rem; font-size:.57rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--blue); opacity:.78; }
    .gitem{ display:flex; align-items:center; gap:.72rem; padding:.5rem .62rem; border-radius:4px; cursor:pointer;
      transition:background .25s, box-shadow .25s, transform .25s; pointer-events:auto; }
    .gitem:hover{ background:rgba(225,235,239,.66); transform:translateX(2px); }
    .gitem.active{ background:rgba(220,232,238,.9);
      box-shadow:inset 3px 0 0 var(--coral); }
    .gitem .n{ flex:none; width:23px; height:23px; border-radius:50%; background:#edf2f2; color:var(--blue-deep); border:1px solid var(--line); font:800 10px/21px 'Manrope'; text-align:center; }
    .gitem.active .n{ background:var(--coral); color:#fff; border-color:transparent; }
    .gitem .tx{ min-width:0; }
    .gitem .cn{ font-size:.73rem; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .gitem .en{ font-size:.56rem; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .gitem.extra .n{ color:#fff; background:var(--blue); border-color:transparent; }
    .gitem.extra.active{ background:rgba(220,232,238,.94); }
    .extra-tag{ display:flex; flex-direction:column; align-items:center; gap:4px; pointer-events:none; transform:translateY(-4px); }
    .extra-tag .dot{ width:18px; height:18px; border-radius:50%; background:var(--coral); border:3px solid var(--paper);
      box-shadow:0 8px 18px rgba(176,43,38,.3), 0 0 0 1px var(--line); }
    .extra-tag .label{ padding:.28rem .56rem; border-radius:4px; background:rgba(248,250,248,.94); border:1px solid var(--line);
      box-shadow:0 7px 18px rgba(16,47,71,.14); color:var(--blue-deep); font:700 .58rem 'Manrope'; white-space:nowrap; }

    .card{ position:fixed; top:50%; right:1.25rem; transform:translate(120%,-50%); z-index:19; width:326px; max-height:80vh;
      border-radius:6px; isolation:isolate;
      background:rgba(248,250,248,.94);
      backdrop-filter:blur(16px) saturate(108%);
      -webkit-backdrop-filter:blur(16px) saturate(108%);
      border:1px solid var(--line); border-top:3px solid var(--coral);
      box-shadow:0 22px 58px rgba(16,47,71,.2), 0 1px 0 rgba(255,255,255,.75) inset;
      padding:1.6rem 1.6rem 1.5rem; overflow-y:auto;
      transition:transform .6s cubic-bezier(.16,1,.3,1), opacity .5s; opacity:0; }
    .card::before{ content:''; position:absolute; inset:0; z-index:0; pointer-events:none; border-radius:inherit;
      background:linear-gradient(150deg, rgba(255,255,255,.42) 0%, rgba(255,255,255,0) 34%); }
    .card > *{ position:relative; z-index:1; }
    .card.show{ transform:translate(0,-50%); opacity:1; }
    .card-close{ position:absolute; top:1rem; right:1rem; z-index:2; width:30px; height:30px; border-radius:4px; border:1px solid var(--line); background:#f4f7f6; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--sub); font-size:1rem; transition:background .2s,color .2s; }
    .card-close:hover{ background:var(--blue-deep); color:#fff; border-color:var(--blue-deep); }
    .card-num{ width:38px; height:38px; border-radius:4px; background:var(--coral); color:#fff; font:800 15px/38px 'Manrope'; text-align:center; box-shadow:0 7px 16px rgba(176,43,38,.24); margin-bottom:1rem; }
    .card-en{ font-family:'Noto Serif SC',serif; font-weight:700; font-size:1.45rem; line-height:1.18; color:var(--blue-deep); letter-spacing:0; }
    .card-cn{ font-size:.86rem; font-weight:700; color:var(--text); margin-top:.35rem; }
    .card-div{ height:1px; background:var(--line); margin:1.15rem 0 1rem; }
    .card-lbl{ font-size:.58rem; letter-spacing:.14em; text-transform:uppercase; color:var(--blue); font-weight:800; opacity:.78; margin-bottom:.7rem; }
    .fac{ display:flex; align-items:baseline; gap:.6rem; padding:.52rem 0; border-bottom:1px solid var(--line); }
    .fac:last-child{ border-bottom:0; }
    .fac .dot{ flex:none; width:5px; height:5px; border-radius:50%; background:var(--coral); transform:translateY(-2px); }
    .fac .fcn{ font-size:.8rem; font-weight:700; color:var(--text); }
    .fac .fen{ font-size:.66rem; color:var(--sub); margin-left:auto; text-align:right; }

    .hint{ position:fixed; bottom:1.25rem; left:50%; transform:translateX(-50%); z-index:18; display:flex; gap:1.2rem; align-items:center; padding:.62rem 1.15rem; border-radius:6px;
      background:rgba(248,250,248,.88);
      backdrop-filter:blur(14px) saturate(108%); -webkit-backdrop-filter:blur(14px) saturate(108%);
      border:1px solid var(--line);
      box-shadow:0 10px 28px rgba(16,47,71,.13);
      font-size:.68rem; color:var(--sub); letter-spacing:.02em; opacity:0; animation:slideU .8s cubic-bezier(.16,1,.3,1) .5s forwards; }
    .hint b{ color:var(--blue); font-weight:600; }
    .hint .sep{ width:1px; height:12px; background:var(--line); }

    .reset{ position:fixed; bottom:1.25rem; right:1.25rem; z-index:18; display:flex; align-items:center; gap:.5rem; padding:.7rem 1rem; border:1px solid rgba(255,255,255,.2); border-radius:6px; cursor:pointer; background:var(--blue-deep); color:#fff; font-size:.72rem; font-weight:700; letter-spacing:.02em; box-shadow:0 8px 22px rgba(16,47,71,.25); opacity:0; animation:slideU .8s cubic-bezier(.16,1,.3,1) .6s forwards; transition:transform .3s, box-shadow .3s, background .2s; }
    .reset:hover{ transform:translateY(-2px); background:var(--blue); box-shadow:0 12px 30px rgba(16,47,71,.3); }
    .reset-icon{ font-size:1rem; line-height:1; }

    .compass{ position:fixed; top:5rem; right:1.45rem; z-index:18; width:52px; height:52px; border-radius:50%;
      background:rgba(248,250,248,.9);
      backdrop-filter:blur(10px) saturate(110%); -webkit-backdrop-filter:blur(10px) saturate(110%);
      border:1px solid var(--line);
      box-shadow:0 8px 22px rgba(16,47,71,.14);
      display:flex; align-items:center; justify-content:center; opacity:0; animation:slideL .8s cubic-bezier(.16,1,.3,1) .55s forwards; }
    .compass .needle{ position:relative; width:100%; height:100%; }
    .compass .n,.compass .s{ position:absolute; left:50%; top:50%; width:0; height:0; }
    .compass .n{ border-left:5px solid transparent; border-right:5px solid transparent; border-bottom:18px solid var(--coral); transform:translate(-50%,-100%); }
    .compass .s{ border-left:5px solid transparent; border-right:5px solid transparent; border-top:18px solid #9eabb0; transform:translate(-50%,0); }
    .compass .lbl{ position:absolute; top:4px; left:50%; transform:translateX(-50%); font-size:.5rem; font-weight:800; color:var(--blue-deep); }

    .loader{ position:fixed; inset:0; z-index:50; background:#e1e9e6; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.2rem; transition:opacity .7s; }
    .loader.hide{ opacity:0; pointer-events:none; }
    .loader .ld-t{ font-family:'Noto Serif SC',serif; font-weight:700; font-size:2.2rem; color:var(--blue-deep); }
    .ld-bar{ width:160px; height:3px; border-radius:3px; background:rgba(23,68,106,.16); overflow:hidden; }
    .ld-bar i{ display:block; width:40%; height:100%; background:var(--coral); border-radius:3px; animation:ldmove 1s ease-in-out infinite; }
    @keyframes ldmove{ 0%{transform:translateX(-100%);} 100%{transform:translateX(350%);} }

    @keyframes slideL{ from{opacity:0; transform:translateY(-50%) translateX(-18px);} to{opacity:1; transform:translateY(-50%) translateX(0);} }
    @keyframes slideU{ from{opacity:0; transform:translateX(-50%) translateY(16px);} to{opacity:1; transform:translateX(-50%) translateY(0);} }

    /* mobile guide trigger (hidden on desktop) */
    .guide-toggle{ display:none; position:fixed; bottom:1.25rem; left:1.1rem; z-index:32;
      align-items:center; gap:.45rem; padding:.7rem 1rem; border:1px solid rgba(255,255,255,.2); border-radius:6px; cursor:pointer;
      background:var(--blue-deep); color:#fff;
      font:700 .76rem 'Manrope'; letter-spacing:0; box-shadow:0 8px 22px rgba(16,47,71,.25); }

    @media (max-width:820px){
      .toptag{ display:none; }
      .topbar{ padding:.9rem 1.05rem; }
      .brand{ gap:.45rem; }
      .brand-mark{ width:27px; height:27px; }
      .brand .u{ font-size:.82rem; letter-spacing:.14em; }
      .brand .cn{ display:none; }
      .modebar{ top:.85rem; gap:1px; padding:4px; }
      .modebar .mode{ padding:.5rem .85rem; font-size:.68rem; }
      .compass{ width:46px; height:46px; top:4.6rem; right:1.1rem; }
      /* Campus Guide → bottom sheet */
      .guide{ top:auto; bottom:0; left:0; right:0; width:auto; max-height:64vh;
        border-radius:6px 6px 0 0; transform:translateY(112%); opacity:1;
        animation:none; transition:transform .45s cubic-bezier(.16,1,.3,1); z-index:33; }
      .guide.open{ transform:translateY(0); }
      .guide.open ~ .reset{ opacity:0 !important; pointer-events:none; }
      .guide.open ~ .guide-toggle{ bottom:calc(64vh - 1.1rem); background:var(--coral); z-index:34; }
      .guide-toggle{ display:inline-flex; transition:bottom .45s cubic-bezier(.16,1,.3,1), opacity .2s; }
      .card{ width:auto; left:.8rem; right:.8rem; top:auto; bottom:5.7rem; transform:translateY(150%); max-height:48vh; z-index:34; }
      .card.show{ transform:translateY(0); }
      .hint{ display:none; }
      .reset{ bottom:1.25rem; right:1.1rem; padding:.66rem .95rem; font-size:.72rem; }
    }
  </style>
</head>
<body>
  <!-- Liquid-glass refraction filter (displaces the backdrop behind glass panels) -->
  <svg class="glass-defs" aria-hidden="true" width="0" height="0">
    <defs>
      <filter id="liquid-glass" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.009 0.013" numOctaves="2" seed="12" result="noise"/>
        <feGaussianBlur in="noise" stdDeviation="1.4" result="softNoise"/>
        <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="28" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <div id="app"></div>

  <div class="loader" id="loader">
    <div class="ld-t">Ulink IB</div>
    <div class="ld-bar"><i></i></div>
    <div style="font-size:.66rem;letter-spacing:.14em;color:var(--sub);text-transform:uppercase">Building campus…</div>
  </div>

  <div class="topbar">
    <div class="brand">
      <img class="brand-mark" src="./logo.png" alt="" />
      <span class="brand-copy">
        <span class="u">ULINK</span>
        <span class="cn">领科教育 · 校园 3D 导览</span>
      </span>
    </div>
    <span class="toptag">Interactive Campus Map</span>
  </div>

  <div class="modebar" id="modebar">
    <span class="mode-ind" id="modeInd"></span>
    <button class="mode active" data-mode="campus">校园全景</button>
    <button class="mode" data-mode="floor">IB 学部</button>
  </div>

  <div class="compass"><div class="needle" id="needle">
    <span class="lbl">N</span><span class="n"></span><span class="s"></span>
  </div></div>

  <aside class="guide">
    <div class="guide-h">
      <div class="t">校园导览</div>
      <div class="s">Campus index · 点击建筑探索</div>
    </div>
    <div class="guide-list" id="guideList"></div>
  </aside>

  <div class="card" id="card">
    <button class="card-close" id="cardClose">&times;</button>
    <div class="card-num" id="cardNum">1</div>
    <div class="card-en" id="cardEn"></div>
    <div class="card-cn" id="cardCn"></div>
    <div class="card-div"></div>
    <div class="card-lbl">Facilities · 设施</div>
    <div id="cardFac"></div>
  </div>

  <div class="hint">
    <span><b>拖拽</b> 旋转</span><span class="sep"></span>
    <span><b>滚轮</b> 缩放</span><span class="sep"></span>
    <span><b>点击</b> 查看建筑</span>
  </div>

  <button class="reset" id="resetBtn"><span class="reset-icon" aria-hidden="true">↻</span><span>重置视角</span></button>
  <button class="guide-toggle" id="guideToggle">☰ 导览</button>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    /* ───────── DATA — real satellite layout (north up, west=left, entrance=south) ───────── */
    const BLUE = 0x17446A;                  // Ulink blue for map outlines and interface accents
    const CORAL = 0xD83A34;                 // school red for active selections
    const MAIN_IDS = new Set([1,12,16]);    // red-brick campus landmarks
    const STONE = {
      mainFront:0xB96858, mainTop:0xF2F1EB,
      secFront:0xD8DCD9, secTop:0xF4F4EF,
      trim:0xF4F1E8, glass:0x486777
    };
    const BUILDINGS = [
      // ── North ──
      {id:1, cn:'宿舍楼', en:'Dormitory', pos:[-6,-37], size:[28,7], h:11, wall:0xD9CDB7, dorm:true,
        fac:[['1号宿舍','Dorm 1'],['2号宿舍','Dorm 2'],['3号宿舍','Dorm 3']]},
      {id:2, cn:'网球场', en:'Tennis Courts', pos:[34,-36], size:[12,9], h:0.5, flat:true, court:0x5F856C, pinY:6,
        fac:[['室外网球场','Outdoor Tennis Courts']]},
      {id:3, cn:'田径运动场', en:'Athletics Field', pos:[0,-22], size:[26,13], h:0.5, flat:true, court:0xB86D62, pinY:7,
        fac:[['标准跑道','Running Track'],['足球场','Soccer Pitch']]},
      // ── Mid band ──
      {id:4, cn:'智慧餐厅', en:'Smart Canteen', pos:[-32,-12], size:[7,6], h:4.6, wall:0xD8C7A8,
        fac:[['机器人烧的饭','Robot-cooked meals']]},
      {id:5, cn:'中餐厅', en:'Chinese Canteen', pos:[-33,-4], size:[8,10], h:4.6, wall:0xD8C7A8, roof:0xB7BEA2,

      const FOLIAGE = [new THREE.Color(0x496B52), new THREE.Color(0x64805B), new THREE.Color(0x7B9168)];
      const pts = [];
      const blocked = (x,z)=>{
        if(Math.abs(x)<16 && z>6 && z<30) return true;          // central lawn
        if(Math.abs(x)<20 && z>-31 && z<-13) return true;       // sports
        for(const b of BUILDINGS){

        }
        return false;

      while(pts.length<82 && tries<1400){
        tries++;
        const x=(Math.random()*2-1)*54, z=(Math.random()*2-1)*46;
        if(Math.abs(x)>52 || Math.abs(z)>45) continue;
        if(blocked(x,z)) continue;
        pts.push([x,z]);

      foliage.castShadow = trunk.castShadow = true;
      const m = new THREE.Matrix4(); const q = new THREE.Quaternion();
      pts.forEach((p,i)=>{

        q.setFromAxisAngle(new THREE.Vector3(0,1,0), Math.random()*Math.PI);
        m.compose(new THREE.Vector3(p[0], 1.8 + (4.2*s)/2, p[1]), q, new THREE.Vector3(s,s,s)); foliage.setMatrixAt(i,m);
        m.compose(new THREE.Vector3(p[0], 0.9, p[1]), q, new THREE.Vector3(s,s,s)); trunk.setMatrixAt(i,m);
        foliage.setColorAt(i, FOLIAGE[Math.floor(Math.random()*FOLIAGE.length)]);
      });

      scene.add(foliage, trunk);

    controls.maxPolarAngle = 1.45; controls.minPolarAngle = 0.15;

    const OVERVIEW_POS = new THREE.Vector3(30, 64, 96);
    const OVERVIEW_TAR = new THREE.Vector3(0, 4, -2);
    /* portrait / narrow screens → pull the overview back so the whole campus fits */
    function ovPos(){
      const a = innerWidth/innerHeight;
      const k = a >= 1.3 ? 1 : Math.min(2.0, 1.3/Math.max(a, 0.45));
      return OVERVIEW_TAR.clone().add(OVERVIEW_POS.clone().sub(OVERVIEW_TAR).multiplyScalar(k));
    }
    controls.target.copy(OVERVIEW_TAR);
    camera.position.set(50, 140, 168);

    /* ───────── CAMERA TWEEN ───────── */
    let tween = null;
    const easeIO = t => t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
    function flyTo(toPos, toTar, dur=1100){
      const p0 = camera.position.clone(), t0 = controls.target.clone();
      const start = performance.now();
      controls.enabled = false;
      tween = (now)=>{
        const k = Math.min(1,(now-start)/dur), e = easeIO(k);
        camera.position.lerpVectors(p0,toPos,e);
        controls.target.lerpVectors(t0,toTar,e);
        camera.lookAt(controls.target);
        if(k>=1){ tween=null; controls.enabled=true; }
      };
    }

    /* ───────── SELECTION ───────── */
    let selectedId=null, selectedExtraKey=null, hoveredId=null, pinHoverId=null;
    let hiddenIds = new Set(), currentMode = 'campus';
    function getExtra(key){ return EXTRA_CLASSROOMS.find(x=>x.key===key); }
    function clearExtraSelection(){
      selectedExtraKey = null;
      hideExtraMarkers();
      Object.values(groups).forEach(g=>{ if(!hiddenIds.has(g.userData.id)) g.userData.opacity = 1; });
      setActiveExtra(null);
    }
    function selectBuilding(id){
      clearExtraSelection();
      selectedId = id;
      const g=groups[id], s=g.userData.size, h=g.userData.h, c=g.position;
      const reach = (Math.max(s[0], s[1], h)*1.5 + 24) * (innerWidth/innerHeight < 1 ? 1.4 : 1);
      const pos = new THREE.Vector3(c.x + reach*0.55, Math.max(h,6)*0.85 + reach*0.5, c.z + reach*0.9);
      const tar = new THREE.Vector3(c.x, Math.max(h,4)*0.45, c.z);
      flyTo(pos,tar,1100); showCard(id); setActive(id);
    }
    function selectExtraClassroom(key){
      const extra = getExtra(key);
      const b = BUILDINGS.find(x=>x.id===extra.buildingId);
      if(currentMode!=='campus'){
        currentMode = 'campus';
        floorCut.visible = false;
        floorLabels.forEach(l=> l.visible = false);
        setTreesVisible(true);
        modebar.querySelectorAll('.mode').forEach(btn=> btn.classList.toggle('active', btn.dataset.mode==='campus'));
        moveInd(modebar.querySelector('.mode[data-mode="campus"]'));
      }
      selectedId = null;
      selectedExtraKey = key;
      hiddenIds = new Set();
      EXTRA_CLASSROOMS.forEach(item=> setExtraMarkerVisible(item.key, item.key===key));
      Object.values(groups).forEach(g=>{ g.userData.opacity = g.userData.id===extra.buildingId ? 1 : 0.18; });
      const target = extraWorld(extra);
      const reach = (Math.max(b.size[0], b.size[1], b.h)*1.25 + 24) * (innerWidth/innerHeight < 1 ? 1.35 : 1);
      const pos = new THREE.Vector3(target.x + reach*0.58, target.y + reach*0.58 + 8, target.z + reach*0.86);
      const tar = new THREE.Vector3(target.x, target.y, target.z);
      flyTo(pos, tar, 1100);
      showExtraCard(extra);
      setActive(null);
      setActiveExtra(key);
    }
    function deselect(){
      selectedId=null; clearExtraSelection(); document.getElementById('card').classList.remove('show'); setActive(null);
      if(currentMode==='campus') flyTo(ovPos(),OVERVIEW_TAR,1100);
    }

    /* ───────── UI ───────── */
    const card = document.getElementById('card');
    function showCard(id){
      const b = BUILDINGS.find(x=>x.id===id);
      document.getElementById('cardNum').textContent = id;
      document.getElementById('cardEn').textContent = b.en;
      document.getElementById('cardCn').textContent = b.cn;
      document.querySelector('.card-lbl').textContent = 'Facilities · 设施';
      document.getElementById('cardFac').innerHTML = b.fac.map(f=>
        `<div class="fac"><span class="dot"></span><span class="fcn">${f[0]}</span><span class="fen">${f[1]}</span></div>`).join('');
      card.classList.add('show');
    }
    function showExtraCard(extra){
      document.getElementById('cardNum').textContent = extra.no;
      document.getElementById('cardEn').textContent = extra.en;
      document.getElementById('cardCn').textContent = extra.cn;
      document.querySelector('.card-lbl').textContent = 'Location · 位置';
      document.getElementById('cardFac').innerHTML = extra.fac.map(f=>
        `<div class="fac"><span class="dot"></span><span class="fcn">${f[0]}</span><span class="fen">${f[1]}</span></div>`).join('');
      card.classList.add('show');
    }
    /* ── Floor-1 interiors for buildings 16 & 14 (from design plan) ── */
    const ROOM_COLORS = {
      classroom:0xA7C0AF, office:0xD9B7A8, toilet:0x9EBFC8, meeting:0xB6C6D1,
      rest:0xD8C58D, storage:0xB8BFC0, computer:0xC98E86, corridor:0xE8ECE9, room:0xC9CED5, exit:0x17446A,
      open:0xE2E5DC
    };
    const ROOMS16 = [
      {code:'C01', type:'office'},
      {code:'C02', name:'储藏室', type:'storage'},
      {code:'C03', name:'办公室', type:'office'},
      {code:'C04', type:'room'}, {code:'C05', type:'room'}, {code:'C06', type:'room'},
      {code:'C07', type:'room'}, {code:'C08', type:'room'}, {code:'C09', type:'room'},
      {code:'C10', name:'办公室', type:'office'},
    ];
    const ROOMS14W = [   // spans roughly match the heights drawn in the sketch
      {code:'A101', type:'classroom', span:1.0}, {code:'男厕', type:'toilet', span:.42},
      {code:'A102', type:'classroom', span:.9},  {code:'A103', type:'classroom', span:1.4},
      {code:'A104', type:'classroom', span:1.3}, {code:'A105', type:'classroom', span:1.0},
      {code:'女厕', type:'toilet', span:.42},     {code:'A106', type:'classroom', span:1.15},
    ];

    const floorLabels = [];   // CSS2D labels for the floor plans — only shown in IB-interior mode
    const floorCut = (function buildInteriors(){
      const root = new THREE.Group();
      const FH=3.2, WH=2.6, WT=0.25;
      const baseMat = new THREE.MeshStandardMaterial({ color:0xEDF0EC, roughness:.95 });
      const wallMat = new THREE.MeshStandardMaterial({ color:0x9CA8A7, roughness:.82, side:THREE.DoubleSide });
      const edgeMat = new THREE.LineBasicMaterial({ color:0x17446A, transparent:true, opacity:.7 });
      const tileMats = {};
      const tileMat = t => tileMats[t] || (tileMats[t]=new THREE.MeshStandardMaterial({ color:ROOM_COLORS[t]??ROOM_COLORS.room, roughness:.85 }));
      /* wall = thin raised box (the "lines" from the plan) */
      function wall(g,w,d,x,z,h){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d), wallMat); m.position.set(x,h/2+0.3,z); m.castShadow=true; m.receiveShadow=true; g.add(m); }
      const hWall=(g,x0,x1,z)=> wall(g, x1-x0, WT, (x0+x1)/2, z, WH);
      const vWall=(g,z0,z1,x)=> wall(g, WT, z1-z0, x, (z0+z1)/2, WH);
      function perimeter(g,w,d){
        const hw=w/2, hd=d/2;
        const base=new THREE.Mesh(new THREE.BoxGeometry(w,0.3,d), baseMat); base.position.y=0.15; base.receiveShadow=true; g.add(base);
        wall(g, w+WT, WT, 0,-hd, FH); wall(g, w+WT, WT, 0, hd, FH);
        wall(g, WT, d, -hw,0, FH);    wall(g, WT, d, hw,0, FH);
        const ey=FH+0.3;
        g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
          [[-hw,ey,-hd],[hw,ey,-hd],[hw,ey,hd],[-hw,ey,hd],[-hw,ey,-hd]].map(p=>new THREE.Vector3(...p))), edgeMat));
      }
      function tileCell(g,x0,x1,z0,z1,r){
        const tile=new THREE.Mesh(new THREE.BoxGeometry((x1-x0)-0.3,0.5,(z1-z0)-0.3), tileMat(r.type));
        tile.position.set((x0+x1)/2,0.3,(z0+z1)/2); tile.receiveShadow=true; g.add(tile);
        if(!r.code) return;                          // unlabeled tile (e.g. corridor strip)
        const div=document.createElement('div'); div.className='room-lbl room-'+(r.type||'room');
        div.innerHTML=`<b>${r.code}</b>`+(r.name?`<small>${r.name}</small>`:'');
        const lb=new CSS2DObject(div); lb.position.set((x0+x1)/2,2.3,(z0+z1)/2); lb.visible=false; g.add(lb); floorLabels.push(lb);
      }
      function title(g,text,z){ const div=document.createElement('div'); div.className='floor-title'; div.textContent=text;
        const lb=new CSS2DObject(div); lb.position.set(0,FH+3,z); lb.visible=false; g.add(lb); floorLabels.push(lb); }

      /* Building 16 — 10 rooms filling one column, walls between */
      const g16=new THREE.Group(); const W16=8, D16=30, n=ROOMS16.length;
      perimeter(g16,W16,D16);
      for(let i=0;i<n;i++){
        const z0=-D16/2 + i*D16/n, z1=z0+D16/n;
        if(i===0){
          /* C01: two 1/4 rooms on the west side — Miranda (north), Hudson (south) */
          const xMid=0, zMid=(z0+z1)/2;
          tileCell(g16, xMid, W16/2, z0, z1, ROOMS16[0]);                       // east half stays C01
          tileCell(g16, -W16/2, xMid, z0, zMid, {code:'Miranda', type:'office'});
          tileCell(g16, -W16/2, xMid, zMid, z1, {code:'Hudson',  type:'office'});
          vWall(g16, z0, z1, xMid);            // wall between west sub-rooms and C01
          hWall(g16, -W16/2, xMid, zMid);      // wall between Miranda and Hudson
        } else {
          tileCell(g16,-W16/2,W16/2,z0,z1,ROOMS16[i]);
          hWall(g16,-W16/2,W16/2,z0);
        }
      }
      title(g16,'IB 楼 · 1F', -D16/2-2);
      g16.position.set(-47,0,22); root.add(g16);

      /* Building 14 — near 1:1 of the sketch:
         west wall = classrooms + toilets · central N-S corridor ·
         east band = computer room (top-left, L-corridor wrapping it) then three
         open zones down the east wall — 办公室, student center (flanked by 会议室
         + 休息区), and lab (its own full cell) — separated by walled corridors. */
      const g14=new THREE.Group(); const W14=16, D14=30, HD=D14/2;
      perimeter(g14,W14,D14);

      // west classroom band ---------------------------------------------
      const wX0=-W14/2, wX1=-4.6;
      const totalW=ROOMS14W.reduce((s,r)=>s+(r.span||1),0); let z=-HD;
      for(let i=0;i<ROOMS14W.length;i++){
        const r=ROOMS14W[i], z0=z, z1=z+D14*(r.span||1)/totalW;
        tileCell(g14,wX0,wX1,z0,z1,r);
        if(i>0) hWall(g14,wX0,wX1,z0);
        z=z1;
      }
      vWall(g14,-HD,HD,wX1);                          // wall: classrooms | corridor

      // central corridor ------------------------------------------------
      const cX0=wX1, cX1=-2.2;
      tileCell(g14, cX0, cX1, -HD, HD, {code:'走廊', type:'corridor'});

      // east band -------------------------------------------------------
      const eX0=cX1, eX1=W14/2, sMid=0.2;
      const corT=1.5;                                 // cross-corridor thickness
      // computer room (top-left) + L-corridor wrapping its right & bottom
      const compX=eX0+0.52*(eX1-eX0), compZ=-10, cor1=-8.5;
      const r1a=cor1, r1b=-3.5;
      const r2a=r1b+corT, r2b=9.5, r2m=(r2a+r2b)/2;
      vWall(g14, -HD, compZ, cX1);                    // corridor | east band, with three openings
      vWall(g14, cor1, r1b, cX1);
      vWall(g14, r1b+corT, r2b, cX1);
      vWall(g14, r2b+corT, HD, cX1);
      tileCell(g14, eX0, compX, -HD, compZ, {code:'计算机教室', type:'computer'});
      tileCell(g14, compX, eX1, -HD, cor1, {type:'corridor'});   // right of computer room
      tileCell(g14, eX0, compX, compZ, cor1, {type:'corridor'}); // below computer room
      vWall(g14, -HD, compZ, compX);                  // computer room east wall
      hWall(g14, eX0, compX, compZ);                  // computer room south wall
      hWall(g14, eX0, eX1, cor1);                     // corridor1 south wall = row-1 north

      // row 1 — 会议室 (small) | 办公室 (open)
      tileCell(g14, eX0, sMid, r1a, r1b, {code:'会议室', type:'meeting'});
      tileCell(g14, sMid, eX1, r1a, r1b, {code:'办公室', type:'open'});
      vWall(g14, r1a, r1b, sMid);
      // cross-corridor (walls both sides)
      tileCell(g14, eX0, eX1, r1b, r1b+corT, {type:'corridor'});
      hWall(g14, eX0, eX1, r1b); hWall(g14, eX0, eX1, r1b+corT);

      // row 2 — 会议室 + 休息区 (small, stacked) | student center (open)
      tileCell(g14, eX0, sMid, r2a, r2m, {code:'会议室', type:'meeting'});
      tileCell(g14, eX0, sMid, r2m, r2b, {code:'休息区', type:'rest'});
      hWall(g14, eX0, sMid, r2m);
      tileCell(g14, sMid, eX1, r2a, r2b, {code:'student center', type:'open'});
      vWall(g14, r2a, r2b, sMid);
      // cross-corridor (walls both sides)
      tileCell(g14, eX0, eX1, r2b, r2b+corT, {type:'corridor'});
      hWall(g14, eX0, eX1, r2b); hWall(g14, eX0, eX1, r2b+corT);

      // row 3 — lab alone in its own full cell
      tileCell(g14, eX0, eX1, r2b+corT, HD, {code:'lab', type:'open'});

      title(g14,'剑桥楼 · 1F', -HD-2);
      g14.position.set(-31,0,22); root.add(g14);

      root.visible=false; scene.add(root);
      return root;
    })();

    /* ── Top slide-bar modes ── */
    const modebar = document.getElementById('modebar');
    const modeInd = document.getElementById('modeInd');
    function moveInd(btn){ if(btn){ modeInd.style.left = btn.offsetLeft+'px'; modeInd.style.width = btn.offsetWidth+'px'; } }
    function setTreesVisible(v){ treeMeshes.forEach(m=> m.visible = v); }
    function setMode(mode){
      currentMode = mode;
      card.classList.remove('show'); selectedId=null; clearExtraSelection(); setActive(null);
      floorCut.visible = (mode==='floor');
      floorLabels.forEach(l=> l.visible = (mode==='floor'));
      if(mode==='campus'){
        hiddenIds = new Set(); setTreesVisible(true);
        flyTo(ovPos(), OVERVIEW_TAR, 1300);
      } else if(mode==='floor'){
        /* IB interior = ground-floor plans of 16 & 14 */
        hiddenIds = new Set(BUILDINGS.map(b=>b.id));
        setTreesVisible(false);
        flyTo(new THREE.Vector3(-37,46,60), new THREE.Vector3(-37,1,22), 1600);
      }
    }
    function activateMode(mode){
      const btn = modebar.querySelector(`.mode[data-mode="${mode}"]`);
      modebar.querySelectorAll('.mode').forEach(b=> b.classList.toggle('active', b===btn));
      moveInd(btn); setMode(mode);
    }
    modebar.querySelectorAll('.mode').forEach(btn=> btn.onclick = ()=> activateMode(btn.dataset.mode));
    requestAnimationFrame(()=> moveInd(modebar.querySelector('.mode.active')));
    addEventListener('resize', ()=> moveInd(modebar.querySelector('.mode.active')));

    document.getElementById('cardClose').onclick = ()=> activateMode('campus');
    document.getElementById('resetBtn').onclick = ()=> activateMode('campus');

    const guideList = document.getElementById('guideList');
    guideList.innerHTML = `
      <div class="guide-section">
        ${BUILDINGS.map(b=>`
          <div class="gitem" data-id="${b.id}">
            <span class="n">${b.id}</span>
            <span class="tx"><div class="cn">${b.cn}</div><div class="en">${b.en}</div></span>
          </div>`).join('')}
      </div>
      <div class="guide-section">
        <div class="guide-section-title">IB学生附加教室</div>
        ${EXTRA_CLASSROOMS.map(extra=>`
          <div class="gitem extra" data-extra="${extra.key}">
            <span class="n">${extra.no}</span>
            <span class="tx"><div class="cn">${extra.cn}</div><div class="en">${extra.where}</div></span>
          </div>`).join('')}
      </div>`;
    guideList.querySelectorAll('.gitem[data-id]').forEach(el=> el.onclick = ()=>{
      selectBuilding(+el.dataset.id);
      document.querySelector('.guide').classList.remove('open');
      if(guideToggle) guideToggle.textContent = '☰ 导览';
    });
    guideList.querySelectorAll('.gitem[data-extra]').forEach(el=> el.onclick = ()=>{
      selectExtraClassroom(el.dataset.extra);
      document.querySelector('.guide').classList.remove('open');
      if(guideToggle) guideToggle.textContent = '☰ 导览';
    });
    const guideToggle = document.getElementById('guideToggle');
    if(guideToggle) guideToggle.onclick = ()=>{
      const isOpen = document.querySelector('.guide').classList.toggle('open');
      guideToggle.textContent = isOpen ? '× 关闭' : '☰ 导览';
    };
    function setActive(id){
      guideList.querySelectorAll('.gitem[data-id]').forEach(el=> el.classList.toggle('active', +el.dataset.id===id));
      const act = guideList.querySelector('.gitem[data-id].active');
      if(act) act.scrollIntoView({block:'nearest', behavior:'smooth'});
    }
    function setActiveExtra(key){
      guideList.querySelectorAll('.gitem[data-extra]').forEach(el=> el.classList.toggle('active', el.dataset.extra===key));
      const act = guideList.querySelector('.gitem[data-extra].active');
      if(act) act.scrollIntoView({block:'nearest', behavior:'smooth'});
    }

    Object.values(groups).forEach(g=>{
      const el=g.userData.pinEl, id=g.userData.id;
      el.onclick = e=>{ e.stopPropagation(); selectBuilding(id); };
      el.onmouseenter = ()=> pinHoverId=id;
      el.onmouseleave = ()=>{ if(pinHoverId===id) pinHoverId=null; };
    });

    /* ───────── PICKING ───────── */
    const raycaster = new THREE.Raycaster();
    const ndc = new THREE.Vector2();
    let pointerIn=false, down=null;
    renderer.domElement.addEventListener('pointermove', e=>{
      pointerIn=true; ndc.x=(e.clientX/innerWidth)*2-1; ndc.y=-(e.clientY/innerHeight)*2+1;
    });
    renderer.domElement.addEventListener('pointerleave', ()=> pointerIn=false);
    renderer.domElement.addEventListener('pointerdown', e=>{ down={x:e.clientX,y:e.clientY}; });
    renderer.domElement.addEventListener('pointerup', e=>{
      if(!down) return;
      const moved = Math.hypot(e.clientX-down.x, e.clientY-down.y); down=null;
      if(moved>10) return;
      ndc.x=(e.clientX/innerWidth)*2-1; ndc.y=-(e.clientY/innerHeight)*2+1;   // tap point (esp. touch)
      raycaster.setFromCamera(ndc, camera);
      const hits = raycaster.intersectObjects(pickMeshes, false);
      if(hits.length) selectBuilding(hits[0].object.userData.pick);
      else if(selectedId!==null || selectedExtraKey!==null) deselect();
    });

    addEventListener('resize', ()=>{
      camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight); labelRenderer.setSize(innerWidth, innerHeight);
    });

    /* ───────── LOOP ───────── */
    const needle = document.getElementById('needle');
    function animate(){
      requestAnimationFrame(animate);
      const now = performance.now();
      if(tween) tween(now); else controls.update();

      if(!tween && pointerIn){
        raycaster.setFromCamera(ndc, camera);
        const hits = raycaster.intersectObjects(pickMeshes, false);
        const rayId = hits.length ? hits[0].object.userData.pick : null;
        hoveredId = pinHoverId!==null ? pinHoverId : rayId;
        renderer.domElement.style.cursor = hoveredId ? 'pointer' : 'grab';
      } else hoveredId = pinHoverId;

      const activeExtra = selectedExtraKey ? getExtra(selectedExtraKey) : null;
      for(const g of Object.values(groups)){
        const id=g.userData.id, active=id===selectedId || (activeExtra && id===activeExtra.buildingId), hover=id===hoveredId;
        const tLift = active ? g.userData.liftA : hover ? g.userData.liftH : 0;
        const tEmis = active ? 0.32 : hover ? 0.18 : 0;
        g.position.y += (tLift - g.position.y)*0.15;
        g.userData.mats.forEach(m=> m.emissiveIntensity += (tEmis - (m.emissiveIntensity||0))*0.15);
        /* fade out non-focused buildings in isolate modes */
        const vis = hiddenIds.has(id) ? 0 : activeExtra ? (id===activeExtra.buildingId ? 1 : 0.18) : 1;
        g.userData.opacity += (vis - g.userData.opacity)*0.12;
        const op = g.userData.opacity;
        g.visible = op > 0.02;
        g.userData.allMats.forEach(m=>{ m.transparent = op < 0.985; m.opacity = op; });
        g.userData.pinEl.style.opacity = op;
        g.userData.pinEl.style.pointerEvents = op > 0.5 ? 'auto' : 'none';
        g.userData.pinEl.classList.toggle('active', active);
        g.userData.pinEl.classList.toggle('hover', hover && !active);
      }

      needle.style.transform = `rotate(${-controls.getAzimuthalAngle()}rad)`;
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();

    requestAnimationFrame(()=>{
      flyTo(ovPos(), OVERVIEW_TAR, 2000);
      setTimeout(()=> document.getElementById('loader').classList.add('hide'), 350);
    });
  </script>
</body>
</html>
