<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Campus 3D · Ulink IB</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --blue:#1F4E8C; --blue-mid:#3368C0; --blue-deep:#163a6b; --coral:#E0734A;
      --text:#1d1d1f; --sub:#6e6e73; --line:rgba(36,84,164,.12);
    }
    *,*::before,*::after{ margin:0; padding:0; box-sizing:border-box; }
    html,body{ width:100%; height:100%; overflow:hidden;
      font-family:'Plus Jakarta Sans',sans-serif; color:var(--text); background:#eef3fb; }
    #app{ position:fixed; inset:0; touch-action:none; }
    #app canvas{ display:block; touch-action:none; }

    .labels{ position:absolute; inset:0; pointer-events:none; }
    .pin{
      width:28px; height:28px; border-radius:50%;
      background:var(--blue); color:#fff;
      font:600 12.5px/28px 'Plus Jakarta Sans'; text-align:center;
      box-shadow:0 5px 14px rgba(36,84,164,.42), 0 0 0 3px rgba(255,255,255,.92);
      pointer-events:auto; cursor:pointer;
      transform:translateY(0); transition:transform .25s cubic-bezier(.34,1.56,.64,1), background .25s, box-shadow .25s;
      will-change:transform;
    }
    .pin.flat{ width:24px; height:24px; line-height:24px; font-size:11px; background:var(--blue-mid); }
    .pin:hover,.pin.hover{ transform:scale(1.18) translateY(-2px); }
    .pin.active{ background:var(--coral); transform:scale(1.34) translateY(-4px);
      box-shadow:0 9px 22px rgba(224,115,74,.6), 0 0 0 4px #fff; }
    /* room labels for the floor-1 plans */
    .room-lbl{ display:flex; flex-direction:column; align-items:center; line-height:1.05; padding:.26rem .5rem; border-radius:9px;
      background:rgba(255,255,255,.66); backdrop-filter:blur(4px); border:1px solid rgba(255,255,255,.72);
      box-shadow:0 2px 7px rgba(31,58,108,.16); color:var(--blue-deep);
      font:700 .62rem 'Plus Jakarta Sans'; letter-spacing:.01em; white-space:nowrap; pointer-events:none; }
    .room-lbl small{ font-weight:500; font-size:.5rem; color:var(--sub); margin-top:1px; }
    .room-lbl.room-exitlbl{ background:rgba(36,84,164,.9); color:#fff; border-color:rgba(255,255,255,.5); }
    .floor-title{ font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:700; font-size:1.2rem; color:var(--blue-deep);
      background:linear-gradient(150deg, rgba(255,255,255,.62), rgba(255,255,255,.3)); backdrop-filter:blur(6px);
      border:1px solid rgba(255,255,255,.66); box-shadow:0 6px 18px rgba(31,58,108,.16);
      padding:.28rem .85rem; border-radius:12px; white-space:nowrap; pointer-events:none; }

    .topbar{ position:fixed; top:0; left:0; right:0; z-index:20;
      display:flex; align-items:center; justify-content:space-between; padding:1.15rem 1.6rem;
      background:linear-gradient(180deg, rgba(238,243,251,.92) 0%, rgba(238,243,251,0) 100%);
      pointer-events:none; }
    .brand{ display:flex; flex-direction:column; gap:2px; pointer-events:auto; }
    .brand .u{ font-weight:700; font-size:1.18rem; letter-spacing:.3em; color:var(--blue); line-height:1; }
    .brand .cn{ font-size:.58rem; font-weight:500; letter-spacing:.16em; color:var(--blue); opacity:.5; }
    .toptag{ font-size:.62rem; letter-spacing:.16em; text-transform:uppercase; color:var(--blue); opacity:.65; font-weight:600; pointer-events:auto; }

    /* ── Top slide-bar (mode switch) ── */
    .modebar{ position:fixed; top:1.05rem; left:50%; transform:translateX(-50%); z-index:21;
      display:flex; gap:2px; padding:5px; border-radius:980px; isolation:isolate;
      background:linear-gradient(150deg, rgba(255,255,255,.34), rgba(255,255,255,.12));
      backdrop-filter:url(#liquid-glass) blur(8px) saturate(185%); -webkit-backdrop-filter:blur(14px) saturate(185%);
      border:1px solid rgba(255,255,255,.55);
      box-shadow:inset 0 1px 1px rgba(255,255,255,.9), 0 10px 30px rgba(31,58,108,.16);
      opacity:0; animation:slideDown .8s cubic-bezier(.16,1,.3,1) .2s forwards; }
    .modebar .mode{ position:relative; z-index:1; border:none; background:transparent; cursor:pointer;
      padding:.52rem 1.05rem; border-radius:980px; font:600 .72rem 'Plus Jakarta Sans'; letter-spacing:.02em;
      color:var(--blue-deep); white-space:nowrap; transition:color .3s; }
    .modebar .mode.active{ color:#fff; }
    .mode-ind{ position:absolute; top:5px; bottom:5px; left:5px; width:80px; z-index:0; border-radius:980px;
      background:linear-gradient(150deg,#3168C8,var(--blue) 60%,var(--blue-deep));
      box-shadow:0 4px 14px rgba(36,84,164,.4), inset 0 1px 0 rgba(255,255,255,.25);
      transition:left .45s cubic-bezier(.34,1.4,.5,1), width .45s cubic-bezier(.34,1.4,.5,1); }
    @keyframes slideDown{ from{opacity:0; transform:translateX(-50%) translateY(-14px);} to{opacity:1; transform:translateX(-50%) translateY(0);} }

    /* ── Liquid-glass sidebar ── */
    .glass-defs{ position:absolute; width:0; height:0; pointer-events:none; }
    .guide{ position:fixed; top:50%; left:1.4rem; transform:translateY(-50%); z-index:18; width:242px; max-height:78vh;
      border-radius:28px; isolation:isolate;
      background:linear-gradient(150deg, rgba(255,255,255,.28), rgba(255,255,255,.07));
      backdrop-filter:url(#liquid-glass) blur(2px) saturate(195%) brightness(1.08);
      -webkit-backdrop-filter:blur(12px) saturate(195%) brightness(1.08);
      border:1px solid rgba(255,255,255,.55);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.95),
        inset 0 -12px 30px rgba(255,255,255,.20),
        inset 1px 0 1px rgba(255,255,255,.45),
        inset -1px 0 1px rgba(255,255,255,.45),
        0 16px 50px rgba(31,58,108,.22),
        0 4px 14px rgba(31,58,108,.12);
      display:flex; flex-direction:column; overflow:hidden;
      opacity:0; animation:slideL .8s cubic-bezier(.16,1,.3,1) .3s forwards; }
    .guide::before{ content:''; position:absolute; inset:0; z-index:0; pointer-events:none; border-radius:inherit;
      background:
        linear-gradient(150deg, rgba(255,255,255,.62) 0%, rgba(255,255,255,0) 34%),
        radial-gradient(130% 80% at 16% -8%, rgba(255,255,255,.55), rgba(255,255,255,0) 52%); }
    .guide::after{ content:''; position:absolute; left:-28%; top:-22%; width:78%; height:60%; z-index:0; pointer-events:none;
      background:radial-gradient(closest-side, rgba(255,255,255,.6), rgba(255,255,255,0) 72%);
      filter:blur(7px); animation:sheen 11s ease-in-out infinite; }
    .guide-h, .guide-list{ position:relative; z-index:1; }
    @keyframes sheen{
      0%{ transform:translate(0,0) scale(1); opacity:.75; }
      50%{ transform:translate(210px,440px) scale(1.3); opacity:.3; }
      100%{ transform:translate(0,0) scale(1); opacity:.75; } }
    .guide-h{ padding:1.05rem 1.2rem .78rem; border-bottom:1px solid rgba(255,255,255,.5); box-shadow:0 1px 0 rgba(31,58,108,.06); }
    .guide-h .t{ font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:700; font-size:1.55rem; color:var(--blue-deep); line-height:1; text-shadow:0 1px 0 rgba(255,255,255,.55); }
    .guide-h .s{ font-size:.6rem; letter-spacing:.1em; color:var(--sub); margin-top:3px; text-transform:uppercase; }
    .guide-list{ overflow-y:auto; padding:.5rem; scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.6) transparent; }
    .guide-list::-webkit-scrollbar{ width:6px; }
    .guide-list::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.55); border-radius:3px; }
    .gitem{ display:flex; align-items:center; gap:.7rem; padding:.5rem .6rem; border-radius:14px; cursor:pointer;
      transition:background .25s, box-shadow .25s, transform .25s; pointer-events:auto; }
    .gitem:hover{ background:rgba(255,255,255,.5); transform:translateX(2px);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.85), 0 3px 10px rgba(31,58,108,.12); }
    .gitem.active{ background:rgba(255,255,255,.66);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.95), 0 4px 12px rgba(36,84,164,.2); }
    .gitem .n{ flex:none; width:22px; height:22px; border-radius:50%; background:var(--blue); color:#fff; font:600 11px/22px 'Plus Jakarta Sans'; text-align:center; box-shadow:0 2px 6px rgba(36,84,164,.35); }
    .gitem.active .n{ background:var(--coral); }
    .gitem .tx{ min-width:0; }
    .gitem .cn{ font-size:.74rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .gitem .en{ font-size:.58rem; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .card{ position:fixed; top:50%; right:1.4rem; transform:translate(120%,-50%); z-index:19; width:332px; max-height:80vh;
      border-radius:28px; isolation:isolate;
      background:linear-gradient(150deg, rgba(255,255,255,.40), rgba(255,255,255,.18));
      backdrop-filter:url(#liquid-glass) blur(3px) saturate(185%) brightness(1.06);
      -webkit-backdrop-filter:blur(15px) saturate(185%);
      border:1px solid rgba(255,255,255,.6);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.95),
        inset 0 -12px 32px rgba(255,255,255,.18),
        0 24px 70px rgba(31,58,108,.24),
        0 5px 16px rgba(31,58,108,.12);
      padding:1.6rem 1.6rem 1.5rem; overflow-y:auto;
      transition:transform .6s cubic-bezier(.16,1,.3,1), opacity .5s; opacity:0; }
    .card::before{ content:''; position:absolute; inset:0; z-index:0; pointer-events:none; border-radius:inherit;
      background:linear-gradient(150deg, rgba(255,255,255,.6) 0%, rgba(255,255,255,0) 32%); }
    .card > *{ position:relative; z-index:1; }
    .card.show{ transform:translate(0,-50%); opacity:1; }
    .card-close{ position:absolute; top:1rem; right:1rem; z-index:2; width:30px; height:30px; border-radius:50%; border:1px solid rgba(255,255,255,.7); background:rgba(255,255,255,.5); backdrop-filter:blur(6px); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--sub); font-size:1rem; transition:background .2s,color .2s; }
    .card-close:hover{ background:var(--blue); color:#fff; border-color:var(--blue); }
    .card-num{ width:38px; height:38px; border-radius:50%; background:var(--coral); color:#fff; font:700 16px/38px 'Plus Jakarta Sans'; text-align:center; box-shadow:0 6px 16px rgba(224,115,74,.34); margin-bottom:1rem; }
    .card-en{ font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:700; font-size:1.85rem; line-height:1.05; color:var(--blue); letter-spacing:-.01em; }
    .card-cn{ font-size:.9rem; font-weight:600; color:var(--text); margin-top:.25rem; }
    .card-div{ height:1px; background:var(--line); margin:1.15rem 0 1rem; }
    .card-lbl{ font-size:.6rem; letter-spacing:.16em; text-transform:uppercase; color:var(--blue); font-weight:600; opacity:.7; margin-bottom:.7rem; }
    .fac{ display:flex; align-items:baseline; gap:.6rem; padding:.5rem 0; border-bottom:1px dashed var(--line); }
    .fac:last-child{ border-bottom:0; }
    .fac .dot{ flex:none; width:5px; height:5px; border-radius:50%; background:var(--blue); transform:translateY(-2px); }
    .fac .fcn{ font-size:.82rem; font-weight:600; color:var(--text); }
    .fac .fen{ font-size:.66rem; color:var(--sub); margin-left:auto; text-align:right; }

    .hint{ position:fixed; bottom:1.4rem; left:50%; transform:translateX(-50%); z-index:18; display:flex; gap:1.4rem; align-items:center; padding:.65rem 1.35rem; border-radius:980px;
      background:linear-gradient(150deg, rgba(255,255,255,.55), rgba(255,255,255,.28));
      backdrop-filter:url(#liquid-glass) blur(8px) saturate(180%); -webkit-backdrop-filter:blur(14px) saturate(180%);
      border:1px solid rgba(255,255,255,.6);
      box-shadow:inset 0 1px 1px rgba(255,255,255,.9), 0 10px 30px rgba(31,58,108,.14);
      font-size:.68rem; color:var(--sub); letter-spacing:.02em; opacity:0; animation:slideU .8s cubic-bezier(.16,1,.3,1) .5s forwards; }
    .hint b{ color:var(--blue); font-weight:600; }
    .hint .sep{ width:1px; height:12px; background:var(--line); }

    .reset{ position:fixed; bottom:1.5rem; right:1.5rem; z-index:18; display:flex; align-items:center; gap:.5rem; padding:.7rem 1.2rem; border:none; border-radius:980px; cursor:pointer; background:linear-gradient(150deg,#3168C8,var(--blue) 55%,var(--blue-deep)); color:#fff; font-size:.74rem; font-weight:600; letter-spacing:.03em; box-shadow:0 6px 20px rgba(36,84,164,.3); opacity:0; animation:slideU .8s cubic-bezier(.16,1,.3,1) .6s forwards; transition:transform .3s, box-shadow .3s; }
    .reset:hover{ transform:translateY(-2px); box-shadow:0 10px 28px rgba(36,84,164,.4); }

    .compass{ position:fixed; top:5.4rem; right:1.6rem; z-index:18; width:54px; height:54px; border-radius:50%;
      background:linear-gradient(150deg, rgba(255,255,255,.55), rgba(255,255,255,.28));
      backdrop-filter:url(#liquid-glass) blur(6px) saturate(180%); -webkit-backdrop-filter:blur(14px) saturate(180%);
      border:1px solid rgba(255,255,255,.6);
      box-shadow:inset 0 1px 1px rgba(255,255,255,.9), 0 8px 22px rgba(31,58,108,.16);
      display:flex; align-items:center; justify-content:center; opacity:0; animation:slideL .8s cubic-bezier(.16,1,.3,1) .55s forwards; }
    .compass .needle{ position:relative; width:100%; height:100%; }
    .compass .n,.compass .s{ position:absolute; left:50%; top:50%; width:0; height:0; }
    .compass .n{ border-left:5px solid transparent; border-right:5px solid transparent; border-bottom:19px solid var(--blue); transform:translate(-50%,-100%); }
    .compass .s{ border-left:5px solid transparent; border-right:5px solid transparent; border-top:19px solid #c9d3e2; transform:translate(-50%,0); }
    .compass .lbl{ position:absolute; top:5px; left:50%; transform:translateX(-50%); font-size:.52rem; font-weight:700; color:var(--blue); }

    .loader{ position:fixed; inset:0; z-index:50; background:#eef3fb; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.2rem; transition:opacity .7s; }
    .loader.hide{ opacity:0; pointer-events:none; }
    .loader .ld-t{ font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:700; font-size:2.6rem; color:var(--blue); }
    .ld-bar{ width:160px; height:3px; border-radius:3px; background:rgba(36,84,164,.15); overflow:hidden; }
    .ld-bar i{ display:block; width:40%; height:100%; background:var(--blue); border-radius:3px; animation:ldmove 1s ease-in-out infinite; }
    @keyframes ldmove{ 0%{transform:translateX(-100%);} 100%{transform:translateX(350%);} }

    @keyframes slideL{ from{opacity:0; transform:translateY(-50%) translateX(-18px);} to{opacity:1; transform:translateY(-50%) translateX(0);} }
    @keyframes slideU{ from{opacity:0; transform:translateX(-50%) translateY(16px);} to{opacity:1; transform:translateX(-50%) translateY(0);} }

    /* mobile guide trigger (hidden on desktop) */
    .guide-toggle{ display:none; position:fixed; bottom:1.5rem; left:1.1rem; z-index:32;
      align-items:center; gap:.45rem; padding:.7rem 1.05rem; border:none; border-radius:980px; cursor:pointer;
      background:linear-gradient(150deg,#3168C8,var(--blue) 55%,var(--blue-deep)); color:#fff;
      font:600 .78rem 'Plus Jakarta Sans'; letter-spacing:.02em; box-shadow:0 6px 20px rgba(31,58,108,.34); }

    @media (max-width:820px){
      .toptag{ display:none; }
      .topbar{ padding:.9rem 1.05rem; }
      .modebar{ top:.85rem; gap:1px; padding:4px; }
      .modebar .mode{ padding:.5rem .85rem; font-size:.68rem; }
      .compass{ width:46px; height:46px; top:4.6rem; right:1.1rem; }
      /* Campus Guide → bottom sheet */
      .guide{ top:auto; bottom:0; left:0; right:0; width:auto; max-height:64vh;
        border-radius:24px 24px 0 0; transform:translateY(112%); opacity:1;
        animation:none; transition:transform .45s cubic-bezier(.16,1,.3,1); z-index:33; }
      .guide.open{ transform:translateY(0); }
      .guide-toggle{ display:inline-flex; }
      .card{ width:auto; left:.8rem; right:.8rem; top:auto; bottom:5.7rem; transform:translateY(150%); max-height:48vh; z-index:34; }
      .card.show{ transform:translateY(0); }
      .hint{ display:none; }
      .reset{ bottom:1.5rem; right:1.1rem; padding:.62rem 1.05rem; font-size:.74rem; }
    }
  </style>
</head>
<body>
  <!-- Liquid-glass refraction filter (displaces the backdrop behind glass panels) -->
  <svg class="glass-defs" aria-hidden="true" width="0" height="0">
    <defs>
      <filter id="liquid-glass" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.009 0.013" numOctaves="2" seed="12" result="noise"/>
        <feGaussianBlur in="noise" stdDeviation="1.4" result="softNoise"/>
        <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="28" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <div id="app"></div>

  <div class="loader" id="loader">
    <div class="ld-t">Ulink IB</div>
    <div class="ld-bar"><i></i></div>
    <div style="font-size:.66rem;letter-spacing:.14em;color:var(--sub);text-transform:uppercase">Building campus…</div>
  </div>

  <div class="topbar">
    <div class="brand">
      <span class="u">ULINK</span>
      <span class="cn">领科教育 · 校园 3D 导览</span>
    </div>
    <span class="toptag">Interactive Campus Map</span>
  </div>

  <div class="modebar" id="modebar">
    <span class="mode-ind" id="modeInd"></span>
    <button class="mode active" data-mode="campus">校园全景</button>
    <button class="mode" data-mode="floor">IB 学部</button>
  </div>

  <div class="compass"><div class="needle" id="needle">
    <span class="lbl">N</span><span class="n"></span><span class="s"></span>
  </div></div>

  <aside class="guide">
    <div class="guide-h">
      <div class="t">Campus Guide</div>
      <div class="s">点击建筑 · 探索校园</div>
    </div>
    <div class="guide-list" id="guideList"></div>
  </aside>

  <div class="card" id="card">
    <button class="card-close" id="cardClose">&times;</button>
    <div class="card-num" id="cardNum">1</div>
    <div class="card-en" id="cardEn"></div>
    <div class="card-cn" id="cardCn"></div>
    <div class="card-div"></div>
    <div class="card-lbl">Facilities · 设施</div>
    <div id="cardFac"></div>
  </div>

  <div class="hint">
    <span><b>拖拽</b> 旋转</span><span class="sep"></span>
    <span><b>滚轮</b> 缩放</span><span class="sep"></span>
    <span><b>点击</b> 查看建筑</span>
  </div>

  <button class="reset" id="resetBtn"><span>重置视角</span></button>
  <button class="guide-toggle" id="guideToggle">☰ 导览</button>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    /* ───────── DATA — real satellite layout (north up, west=left, entrance=south) ───────── */
    const BLUE = 0x1F4E8C;                  // normal pins, logo, top toggle, guide card
    const CORAL = 0xE0734A;                 // selected pin / highlighted building
    const MAIN_IDS = new Set([1,12,16]);    // warm-stone main mass
    const STONE = { mainFront:0xDCD3C4, mainTop:0xEFE9DD, secFront:0xD2CCBE, secTop:0xE4E0D6 };
    const BUILDINGS = [
      // ── North ──
      {id:1, cn:'宿舍楼', en:'Dormitory', pos:[-6,-37], size:[28,7], h:11, wall:0xb6745a, dorm:true,
        fac:[['1号宿舍','Dorm 1'],['2号宿舍','Dorm 2'],['3号宿舍','Dorm 3']]},
      {id:2, cn:'网球场', en:'Tennis Courts', pos:[34,-36], size:[12,9], h:0.5, flat:true, court:0x3d7d5a, pinY:6,
        fac:[['室外网球场','Outdoor Tennis Courts']]},
      {id:3, cn:'田径运动场', en:'Athletics Field', pos:[0,-22], size:[26,13], h:0.5, flat:true, court:0xCBD6B0, pinY:7,
        fac:[['标准跑道','Running Track'],['足球场','Soccer Pitch']]},
      // ── Mid band ──
      {id:4, cn:'智慧餐厅', en:'Smart Canteen', pos:[-32,-12], size:[7,6], h:7, wall:0xcf9b6f,
        fac:[['自助取餐','Smart Self-service Dining']]},
      {id:5, cn:'中餐厅', en:'Chinese Canteen', pos:[-33,-4], size:[8,10], h:9, wall:0xcf9b6f, roof:0x6f86b8,
        fac:[['中餐档口','Chinese Dining Hall']]},
      {id:6, cn:'便利店', en:'Convenience Store', pos:[-6,-13], size:[6,4], h:5, wall:0xcf9b6f,
        fac:[['便利店','Convenience Store'],['超市','Grocery']]},

      const edgeMat = new THREE.LineBasicMaterial({ color:0x1F4E8C, transparent:true, opacity:.7 });
      const tileMats = {};
      const tileMat = t => tileMats[t] || (tileMats[t]=new THREE.MeshStandardMaterial({ color:ROOM_COLORS[t]??ROOM_COLORS.room, roughness:.85 }));
      /* wall = thin raised box (the "lines" from the plan) */
      function wall(g,w,d,x,z,h){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d), wallMat); m.position.set(x,h/2+0.3,z); m.castShadow=true; m.receiveShadow=true; g.add(m); }
      const hWall=(g,x0,x1,z)=> wall(g, x1-x0, WT, (x0+x1)/2, z, WH);
      const vWall=(g,z0,z1,x)=> wall(g, WT, z1-z0, x, (z0+z1)/2, WH);
      function perimeter(g,w,d){
        const hw=w/2, hd=d/2;
        const base=new THREE.Mesh(new THREE.BoxGeometry(w,0.3,d), baseMat); base.position.y=0.15; base.receiveShadow=true; g.add(base);
        wall(g, w+WT, WT, 0,-hd, FH); wall(g, w+WT, WT, 0, hd, FH);
        wall(g, WT, d, -hw,0, FH);    wall(g, WT, d, hw,0, FH);
        const ey=FH+0.3;
        g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
          [[-hw,ey,-hd],[hw,ey,-hd],[hw,ey,hd],[-hw,ey,hd],[-hw,ey,-hd]].map(p=>new THREE.Vector3(...p))), edgeMat));
      }
      function tileCell(g,x0,x1,z0,z1,r){
        const tile=new THREE.Mesh(new THREE.BoxGeometry((x1-x0)-0.3,0.5,(z1-z0)-0.3), tileMat(r.type));
        tile.position.set((x0+x1)/2,0.3,(z0+z1)/2); tile.receiveShadow=true; g.add(tile);
        const div=document.createElement('div'); div.className='room-lbl room-'+(r.type||'room');
        div.innerHTML=`<b>${r.code}</b>`+(r.name?`<small>${r.name}</small>`:'');
        const lb=new CSS2DObject(div); lb.position.set((x0+x1)/2,2.3,(z0+z1)/2); lb.visible=false; g.add(lb); floorLabels.push(lb);
      }
      function title(g,text,z){ const div=document.createElement('div'); div.className='floor-title'; div.textContent=text;
        const lb=new CSS2DObject(div); lb.position.set(0,FH+3,z); lb.visible=false; g.add(lb); floorLabels.push(lb); }

      /* Building 16 — 10 rooms filling one column, walls between */
      const g16=new THREE.Group(); const W16=8, D16=30, n=ROOMS16.length;
      perimeter(g16,W16,D16);
      for(let i=0;i<n;i++){
        const z0=-D16/2 + i*D16/n, z1=z0+D16/n;
        if(i===0){
          /* C01: two 1/4 rooms on the west side — Miranda (north), Hudson (south) */
          const xMid=0, zMid=(z0+z1)/2;
          tileCell(g16, xMid, W16/2, z0, z1, ROOMS16[0]);                       // east half stays C01
          tileCell(g16, -W16/2, xMid, z0, zMid, {code:'Miranda', type:'office'});
          tileCell(g16, -W16/2, xMid, zMid, z1, {code:'Hudson',  type:'office'});
          vWall(g16, z0, z1, xMid);            // wall between west sub-rooms and C01
          hWall(g16, -W16/2, xMid, zMid);      // wall between Miranda and Hudson
        } else {
          tileCell(g16,-W16/2,W16/2,z0,z1,ROOMS16[i]);
          hWall(g16,-W16/2,W16/2,z0);
        }
      }
      title(g16,'IB 楼 · 1F', -D16/2-2);
      g16.position.set(-47,0,22); root.add(g16);

      /* Building 14 — west A-rooms + east wing (computer room on top, small rooms
         left / open zones right), matching the floor plan */
      const g14=new THREE.Group(); const W14=14, D14=30, HD=D14/2;
      perimeter(g14,W14,D14);
      const wX0=-W14/2, wX1=-2.5;                     // west classroom block (full depth)
      const totalW=ROOMS14W.reduce((s,r)=>s+(r.span||1),0); let z=-HD;
      for(let i=0;i<ROOMS14W.length;i++){
        const r=ROOMS14W[i], z0=z, z1=z+D14*(r.span||1)/totalW;
        tileCell(g14,wX0,wX1,z0,z1,r);
        if(i>0) hWall(g14,wX0,wX1,z0);
        z=z1;
      }
      vWall(g14,-HD,HD,wX1);                          // wall: west block | east wing

      /* east wing: 计算机教室 fills the top; below = small rooms (left) + open zones (right) */
      const eX0=wX1, eX1=W14/2, mid=1, zc=-8, zr1=-0.4, zr2=7.2;
      tileCell(g14, eX0, eX1, -HD, zc,  {code:'计算机教室', type:'computer'});
      tileCell(g14, eX0, mid, zc,  zr1, {code:'会议室', type:'meeting'});
      tileCell(g14, mid, eX1, zc,  zr1, {code:'办公室', type:'open'});
      tileCell(g14, eX0, mid, zr1, zr2, {code:'会议室', type:'meeting'});
      tileCell(g14, mid, eX1, zr1, zr2, {code:'student center', type:'open'});
      tileCell(g14, eX0, mid, zr2, HD,  {code:'休息区', type:'rest'});
      tileCell(g14, mid, eX1, zr2, HD,  {code:'lab', type:'open'});
      hWall(g14, eX0, eX1, zc);                       // computer-room bottom
      vWall(g14, zc, HD, mid);                        // small rooms | open zones
      hWall(g14, eX0, eX1, zr1); hWall(g14, eX0, eX1, zr2);   // row dividers

      title(g14,'剑桥楼 · 1F', -HD-2);
      g14.position.set(-31,0,22); root.add(g14);

      root.visible=false; scene.add(root);
      return root;
    })();

    /* ── Top slide-bar modes ── */
    const modebar = document.getElementById('modebar');
    const modeInd = document.getElementById('modeInd');
    function moveInd(btn){ if(btn){ modeInd.style.left = btn.offsetLeft+'px'; modeInd.style.width = btn.offsetWidth+'px'; } }
    function setTreesVisible(v){ treeMeshes.forEach(m=> m.visible = v); }
    function setMode(mode){
      currentMode = mode;
      card.classList.remove('show'); selectedId=null; setActive(null);
      floorCut.visible = (mode==='floor');
      floorLabels.forEach(l=> l.visible = (mode==='floor'));
      if(mode==='campus'){
        hiddenIds = new Set(); setTreesVisible(true);
        flyTo(ovPos(), OVERVIEW_TAR, 1300);
      } else if(mode==='floor'){
        /* IB interior = ground-floor plans of 16 & 14 */
        hiddenIds = new Set(BUILDINGS.map(b=>b.id));
        setTreesVisible(false);
        flyTo(new THREE.Vector3(-37,46,60), new THREE.Vector3(-37,1,22), 1600);
      }
    }
    function activateMode(mode){
      const btn = modebar.querySelector(`.mode[data-mode="${mode}"]`);
      modebar.querySelectorAll('.mode').forEach(b=> b.classList.toggle('active', b===btn));
      moveInd(btn); setMode(mode);
    }
    modebar.querySelectorAll('.mode').forEach(btn=> btn.onclick = ()=> activateMode(btn.dataset.mode));
    requestAnimationFrame(()=> moveInd(modebar.querySelector('.mode.active')));
    addEventListener('resize', ()=> moveInd(modebar.querySelector('.mode.active')));

    document.getElementById('cardClose').onclick = ()=> activateMode('campus');
    document.getElementById('resetBtn').onclick = ()=> activateMode('campus');

    const guideList = document.getElementById('guideList');
    guideList.innerHTML = BUILDINGS.map(b=>
      `<div class="gitem" data-id="${b.id}">
        <span class="n">${b.id}</span>
        <span class="tx"><div class="cn">${b.cn}</div><div class="en">${b.en}</div></span>
      </div>`).join('');
    guideList.querySelectorAll('.gitem').forEach(el=> el.onclick = ()=>{ selectBuilding(+el.dataset.id); document.querySelector('.guide').classList.remove('open'); });
    const guideToggle = document.getElementById('guideToggle');
    if(guideToggle) guideToggle.onclick = ()=> document.querySelector('.guide').classList.toggle('open');
    function setActive(id){
      guideList.querySelectorAll('.gitem').forEach(el=> el.classList.toggle('active', +el.dataset.id===id));
      const act = guideList.querySelector('.gitem.active');
      if(act) act.scrollIntoView({block:'nearest', behavior:'smooth'});
    }

    Object.values(groups).forEach(g=>{
      const el=g.userData.pinEl, id=g.userData.id;
      el.onclick = e=>{ e.stopPropagation(); selectBuilding(id); };
      el.onmouseenter = ()=> pinHoverId=id;
      el.onmouseleave = ()=>{ if(pinHoverId===id) pinHoverId=null; };
    });

    /* ───────── PICKING ───────── */
    const raycaster = new THREE.Raycaster();
    const ndc = new THREE.Vector2();
    let pointerIn=false, down=null;
    renderer.domElement.addEventListener('pointermove', e=>{
      pointerIn=true; ndc.x=(e.clientX/innerWidth)*2-1; ndc.y=-(e.clientY/innerHeight)*2+1;
    });
    renderer.domElement.addEventListener('pointerleave', ()=> pointerIn=false);
    renderer.domElement.addEventListener('pointerdown', e=>{ down={x:e.clientX,y:e.clientY}; });
    renderer.domElement.addEventListener('pointerup', e=>{
      if(!down) return;
      const moved = Math.hypot(e.clientX-down.x, e.clientY-down.y); down=null;
      if(moved>10) return;
      ndc.x=(e.clientX/innerWidth)*2-1; ndc.y=-(e.clientY/innerHeight)*2+1;   // tap point (esp. touch)
      raycaster.setFromCamera(ndc, camera);
      const hits = raycaster.intersectObjects(pickMeshes, false);
      if(hits.length) selectBuilding(hits[0].object.userData.pick);
      else if(selectedId!==null) deselect();
    });

    addEventListener('resize', ()=>{
      camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight); labelRenderer.setSize(innerWidth, innerHeight);
    });

    /* ───────── LOOP ───────── */
    const needle = document.getElementById('needle');
    function animate(){
      requestAnimationFrame(animate);
      const now = performance.now();
      if(tween) tween(now); else controls.update();

      if(!tween && pointerIn){
        raycaster.setFromCamera(ndc, camera);
        const hits = raycaster.intersectObjects(pickMeshes, false);
        const rayId = hits.length ? hits[0].object.userData.pick : null;
        hoveredId = pinHoverId!==null ? pinHoverId : rayId;
        renderer.domElement.style.cursor = hoveredId ? 'pointer' : 'grab';
      } else hoveredId = pinHoverId;

      for(const g of Object.values(groups)){
        const id=g.userData.id, active=id===selectedId, hover=id===hoveredId;
        const tLift = active ? g.userData.liftA : hover ? g.userData.liftH : 0;
        const tEmis = active ? 0.32 : hover ? 0.18 : 0;
        g.position.y += (tLift - g.position.y)*0.15;
        g.userData.mats.forEach(m=> m.emissiveIntensity += (tEmis - (m.emissiveIntensity||0))*0.15);
        /* fade out non-focused buildings in isolate modes */
        const vis = hiddenIds.has(id) ? 0 : 1;
        g.userData.opacity += (vis - g.userData.opacity)*0.12;
        const op = g.userData.opacity;
        g.visible = op > 0.02;
        g.userData.allMats.forEach(m=>{ m.transparent = op < 0.985; m.opacity = op; });
        g.userData.pinEl.style.opacity = op;
        g.userData.pinEl.style.pointerEvents = op > 0.5 ? 'auto' : 'none';
        g.userData.pinEl.classList.toggle('active', active);
        g.userData.pinEl.classList.toggle('hover', hover && !active);
      }

      needle.style.transform = `rotate(${-controls.getAzimuthalAngle()}rad)`;
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();

    requestAnimationFrame(()=>{
      flyTo(ovPos(), OVERVIEW_TAR, 2000);
      setTimeout(()=> document.getElementById('loader').classList.add('hide'), 350);
    });
  </script>
</body>
</html>
