<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>欢迎 · 领科 IB 校园导览</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #102f47;
    --paper: #f8faf8;
    --accent: #d83a34;
    --accent-press: #b92c29;
    --sky: #6c9cbb;
    --sky-2: #b8d3d9;
    --font-en: "Manrope", system-ui, sans-serif;
    --font-cn: "Noto Serif SC", "Songti SC", serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: var(--font-cn);
    color: var(--paper);
    background: var(--ink);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
  }

  /* ---- background photo ---- */
  .bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    background:
      linear-gradient(135deg, var(--sky) 0%, var(--sky-2) 100%);
    background-image: url("assets/campus.png");
    background-size: cover;
    background-position: center 31%;
    filter: saturate(.86) contrast(1.04);
  }

  /* legibility scrims — keep top airy, anchor text at the bottom-left */
  .scrim {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      linear-gradient(to top, rgba(10,35,52,.92) 0%, rgba(10,35,52,.62) 36%, rgba(10,35,52,.18) 62%, transparent 88%),
      linear-gradient(100deg, rgba(10,35,52,.78) 0%, rgba(10,35,52,.38) 42%, transparent 70%);
  }

  /* ---- content ---- */
  .content {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: clamp(22px, 4vw, 56px);
  }

  /* top bar */
  .topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    opacity: 0;
    animation: rise 0.8s 0.05s cubic-bezier(.2,.7,.2,1) forwards;
  }
  .logo-slot {
    width: clamp(40px, 5.5vw, 52px);
    height: clamp(40px, 5.5vw, 52px);
    flex: none;
    background: rgba(248,250,248,.96);
    border: 1px solid rgba(255,255,255,.7);
    border-radius: 6px;
    box-shadow: 0 8px 26px rgba(10,35,52,.18);
    overflow: hidden;
  }
  .logo-slot img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .wordmark {
    display: flex;
    flex-direction: column;
    line-height: 1.18;
    text-shadow: 0 1px 14px rgba(10,35,52,.45);
  }
  .wordmark b {
    font-family: var(--font-en);
    font-weight: 800;
    font-size: clamp(15px, 1.7vw, 19px);
    letter-spacing: 0;
  }
  .wordmark span {
    font-family: var(--font-en);
    font-weight: 600;
    font-size: clamp(11px, 1.2vw, 13px);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    opacity: 0.82;
  }

  /* hero block, anchored lower-left */
  .hero {
    margin-top: auto;
    max-width: min(820px, 94%);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 4px 0 4px 13px;
    border-left: 3px solid var(--accent);
    font-family: var(--font-en);
    font-weight: 700;
    font-size: clamp(11px, 1.25vw, 13.5px);
    letter-spacing: .06em;
    margin-bottom: clamp(18px, 2.6vw, 28px);
    opacity: 0;
    animation: rise 0.8s 0.18s cubic-bezier(.2,.7,.2,1) forwards;
  }
  .badge .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 4px rgba(216,58,52,.28);
    animation: pulse 2.4s ease-in-out infinite;
  }

  h1 {
    font-family: var(--font-cn);
    font-weight: 900;
    font-size: clamp(39px, 7vw, 80px);
    line-height: 1.08;
    letter-spacing: 0;
    text-shadow: 0 3px 28px rgba(10,35,52,.42);
    margin-bottom: clamp(8px, 1.4vw, 16px);
    opacity: 0;
    animation: rise 0.9s 0.28s cubic-bezier(.2,.7,.2,1) forwards;
  }
  h1 .en {
    display: block;
    font-family: var(--font-en);
    font-weight: 800;
    font-size: clamp(17px, 2.6vw, 29px);
    letter-spacing: .02em;
    color: rgba(248,250,248,.94);
    margin-top: clamp(6px, 1vw, 12px);
  }

  .sub {
    font-family: var(--font-cn);
    font-weight: 500;
    font-size: clamp(15px, 1.9vw, 21px);
    line-height: 1.5;
    max-width: 540px;
    opacity: 0;
    text-shadow: 0 1px 16px rgba(10,35,52,.5);
    color: rgba(248,250,248,.9);
    margin-bottom: clamp(26px, 3.6vw, 42px);
    animation: rise 0.9s 0.38s cubic-bezier(.2,.7,.2,1) forwards;
    text-wrap: pretty;
  }
  .sub .en {
    display: block;
    font-family: var(--font-en);
    font-size: clamp(13px, 1.45vw, 16px);
    opacity: 0.78;
    margin-top: 4px;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: clamp(14px, 1.7vw, 17px) clamp(23px, 2.7vw, 31px);
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: #fff;
    font-family: var(--font-en);
    font-weight: 700;
    font-size: clamp(14px, 1.7vw, 17px);
    letter-spacing: .01em;
    text-decoration: none;
    cursor: pointer;
    box-shadow: 0 12px 30px rgba(142,35,32,.34), inset 0 1px 0 rgba(255,255,255,.2);
    transition: transform .25s cubic-bezier(.2,.7,.2,1), box-shadow .25s, background .2s;
    opacity: 0;
    animation: rise 0.9s 0.5s cubic-bezier(.2,.7,.2,1) forwards;
  }
  .cta:hover {
    background: var(--accent-press);
    transform: translateY(-3px);
    box-shadow: 0 18px 42px rgba(142,35,32,.42), inset 0 1px 0 rgba(255,255,255,.2);
  }
  .cta:active { transform: translateY(-1px); }
  .cta .arrow {
    display: inline-block;
    transition: transform .28s cubic-bezier(.2,.7,.2,1);
    font-size: 1.1em;
  }
  .cta:hover .arrow { transform: translateX(5px); }

  @keyframes rise {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(216,58,52,.34); }
    50%      { box-shadow: 0 0 0 7px rgba(216,58,52,0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .topbar, .badge, h1, .sub, .cta { animation: none; opacity: 1; }
    .badge .dot { animation: none; }
  }

  /* very small / portrait phones: pull the hero up a touch, tighten */
  @media (max-width: 560px) {
    .sub { max-width: 100%; }
    .hero { max-width: 100%; }
    .wordmark span { letter-spacing: .1em; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="bg"></div>
    <div class="scrim"></div>

    <div class="content">
      <header class="topbar">
        <div class="logo-slot">
          <img src="./logo.png" alt="领科 IB 校徽" />
        </div>
        <div class="wordmark">
          <b>领科 IB 学部</b>
          <span>Ulink College · IB</span>
        </div>
      </header>

      <div class="hero">
        <div class="badge">
          <span class="dot"></span>
          新生校园导览 · Freshman Campus Guide
        </div>

        <h1>
          领科 IB 校园导览
          <span class="en">Ulink IB Campus Guide</span>
        </h1>

        <p class="sub">
          欢迎来到领科。用一张 3D 地图，认识教室、食堂、图书馆和即将朝夕相处的校园。
          <span class="en">Take two minutes to explore the campus that's about to become home.</span>
        </p>

        <a class="cta" href="./campus.html">
          进入 3D 校园
          <span class="arrow">→</span>
        </a>

      </div>
    </div>
  </div>
</body>
</html>
